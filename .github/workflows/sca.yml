name: sca

# Software Composition Analysis (SCA) of third-party dependencies with Trivy (Aqua, Apache-2.0).
# Scans the Maven modules (pom.xml) AND the Node CLI (package-lock.json) for known-vulnerable
# components, plus emits a CycloneDX SBOM (component inventory). GATES the build on CRITICAL
# findings; HIGH/MEDIUM/LOW are surfaced (SARIF -> Security tab + artifact) but non-blocking, so a
# handed-off pipeline is green on arrival while remaining debt stays visible. Tighten the gate to
# HIGH once the auxiliary CLI's transitive advisories (e.g. lodash/tmp via inquirer) are triaged.
# CodeQL is intentionally not used here; Trivy is the FOSS SCA scanner. Complements the SAST
# (OpenGrep) workflow — that covers first-party source; this covers dependencies.
#
# Network-robustness (two independent rate limits are in play):
#   1. Trivy's own vuln DB (registry) — pulled ONCE in a dedicated step with retry+backoff, then
#      every scan runs with --skip-db-update so it is fetched exactly once.
#   2. Maven Central — Trivy resolves parent/BOM POMs remotely by default, and Sonatype 429s the
#      shared runner IP with a 30-min block (Retry-After: 1800), which no short backoff can ride
#      out. So scans use --offline-scan: no remote POM calls, no Maven Central dependency. The npm
#      lockfile is fully resolved offline (this is where the real debt is); Maven coverage is
#      best-effort from the poms (+ any cached ~/.m2). To restore full Maven transitive coverage,
#      cache ~/.m2 from the build job and drop --offline-scan.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:   # so the Release workflow can run this as a gate before publishing

permissions:
  contents: read
  security-events: write   # SARIF upload -> Security tab

env:
  TRIVY_VERSION: "0.72.0"

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Trivy (pinned release)
        run: |
          curl -sfL "https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh" \
            | sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
          trivy --version

      - name: Download Trivy databases once (retry 5x with exponential backoff)
        run: |
          set -u
          retry() {
            local n=1 max=5 delay=15
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "::error::Trivy DB download failed after ${max} attempts: $*"
                return 1
              fi
              echo "::warning::DB download attempt ${n}/${max} failed (registry rate limit?); retrying in ${delay}s"
              sleep "${delay}"
              n=$((n + 1)); delay=$((delay * 2))
            done
          }
          retry trivy image --download-db-only --no-progress
          retry trivy image --download-java-db-only --no-progress

      - name: Trivy SCA — full report (SARIF, all severities, non-blocking)
        run: |
          trivy fs --scanners vuln --offline-scan \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --format sarif --output trivy.sarif \
            --skip-db-update --skip-java-db-update \
            --no-progress --exit-code 0 .

      - name: Trivy SCA — CycloneDX SBOM (component inventory)
        run: |
          trivy fs --offline-scan --format cyclonedx --output sbom.cdx.json \
            --skip-db-update --skip-java-db-update \
            --no-progress --exit-code 0 .

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy.sarif
          category: trivy-sca

      - name: Upload SCA report + SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-sca
          path: |
            trivy.sarif
            sbom.cdx.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Trivy SCA — GATE on CRITICAL
        run: |
          trivy fs --scanners vuln --offline-scan \
            --severity CRITICAL \
            --skip-db-update --skip-java-db-update \
            --no-progress --exit-code 1 .
