name: Reusable build workflow

on: workflow_call

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven (version pinned via the wrapper)
        run: ./mvnw -B install --file pom.xml
      - name: Generate aggregate CycloneDX SBOM (resolved Maven dependency graph)
        run: ./mvnw -B -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom
      - name: Stage exactly the two provider jars (+ SBOM)
        run: |
          set -euo pipefail
          mkdir staging
          shopt -s extglob nullglob
          # Copy ONLY the shaded provider jar from each module — never Maven Shade's pre-shade
          # `original-*.jar` backup, which is an incomplete artifact that must not be signed or released.
          for module in sms-authenticator enforce-mfa; do
            jars=( "$module"/target/!(original-*).jar )
            if [ "${#jars[@]}" -ne 1 ]; then
              echo "::error::expected exactly one provider jar in $module/target, found: ${jars[*]:-none}"
              exit 1
            fi
            cp "${jars[0]}" staging/
          done
          cp target/bom.json staging/sbom.cdx.json
          jar_count=$(ls -1 staging/*.jar | wc -l)
          if [ "$jar_count" -ne 2 ]; then
            echo "::error::expected exactly 2 staged provider jars, found $jar_count"
            exit 1
          fi
          echo "Staged artifacts:"; ls -1 staging
      - name: Create hash files
        run: |
          for jar in *.jar
          do
              sha512sum $jar | awk '{ print $1 }' > "${jar}.sha512"
          done
        working-directory: staging
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages
          path: staging
          retention-days: 7
