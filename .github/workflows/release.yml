# Build a Java project with Maven and publish the provider jars as a signed GitHub Release.
# Triggered by a v* tag. Each jar is cosign keyless-signed (Fulcio/Rekor) so a downstream consumer
# can verify it was built by THIS workflow at THIS tag, not merely match a co-hosted checksum.

name: Release

on:
  push:
    tags:
      - v**

# Least-privilege default for the whole workflow. The called SAST/SCA workflows also upload SARIF to
# the Security tab, which needs security-events: write; the release job overrides with what it needs.
permissions:
  contents: read
  security-events: write

jobs:
  # A release is gated on: the build (which runs the unit tests), SAST (OpenGrep), and SCA (Trivy,
  # CRITICAL gate). Any of them failing blocks publication of the tag.
  build:
    uses: ./.github/workflows/build.yml
  sast:
    uses: ./.github/workflows/sast.yaml
  sca:
    uses: ./.github/workflows/sca.yml
  release:
    needs: [build, sast, sca]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # cosign keyless (Fulcio/Rekor)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages
          path: staging
      - name: Verify exactly the two provider jars are present (no stray artifacts)
        working-directory: staging
        run: |
          set -euo pipefail
          jar_count=$(ls -1 *.jar | wc -l)
          if [ "$jar_count" -ne 2 ]; then
            echo "::error::expected exactly 2 provider jars to sign/release, found $jar_count"
            ls -1; exit 1
          fi
          if ls original-*.jar >/dev/null 2>&1; then
            echo "::error::a Maven Shade original-*.jar reached the release staging area"; exit 1
          fi
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign each artifact (keyless; entries land in the public Rekor log)
        working-directory: staging
        run: |
          set -euo pipefail
          for blob in *.jar sbom.cdx.json; do
            [ -e "$blob" ] || continue
            cosign sign-blob --yes "$blob" \
              --output-signature "$blob.sig" \
              --output-certificate "$blob.pem"
          done
      - name: Create release
        run: gh release create "${GITHUB_REF_NAME}" staging/* --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
