name: sast

# Static analysis (SAST) of the Keycloak MFA/SMS provider source with OpenGrep
# (the OSS, Apache-2.0 Semgrep fork). GATES on findings, with a tuned ruleset: java/spring is
# dropped (it false-matches non-Spring Keycloak SPIs) and Markdown is excluded (.semgrepignore +
# --exclude — doc example tokens are not real secrets). Findings → SARIF (Security tab) + artifact.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF upload → Security tab

jobs:
  opengrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install OpenGrep (pinned, cosign-signed binary)
        run: |
          curl -fsSL https://github.com/opengrep/opengrep/releases/download/v1.23.0/opengrep_manylinux_x86 -o /usr/local/bin/opengrep
          chmod +x /usr/local/bin/opengrep
          opengrep --version

      - name: Fetch OpenGrep OSS rules (drop the spring pack)
        run: |
          git clone --depth 1 https://github.com/opengrep/opengrep-rules.git /tmp/ogr
          rm -rf /tmp/ogr/java/spring   # false-matches non-Spring Keycloak SPIs

      - name: OpenGrep — GATE on findings (SARIF report)
        run: |
          opengrep scan --config /tmp/ogr/java --config /tmp/ogr/generic/secrets \
            --error --exclude '*.md' \
            --sarif --output opengrep.sarif .

      - name: Upload OpenGrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: opengrep.sarif
          category: opengrep

      - name: Upload OpenGrep report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: opengrep-sast
          path: opengrep.sarif
          if-no-files-found: ignore
