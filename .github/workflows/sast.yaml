name: sast

# Static analysis (SAST) of the Keycloak MFA/SMS provider source with OpenGrep
# (the OSS, Apache-2.0 Semgrep fork). GATES on findings, with a tuned ruleset: java/spring is
# dropped (it false-matches non-Spring Keycloak SPIs) and Markdown is excluded (.semgrepignore +
# --exclude — doc example tokens are not real secrets). Findings → SARIF (Security tab) + artifact.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:   # so the Release workflow can run this as a gate before publishing

permissions:
  contents: read
  security-events: write   # SARIF upload → Security tab

jobs:
  opengrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install OpenGrep (pinned binary, sha256-verified)
        env:
          OPENGREP_VERSION: v1.23.0
          # sha256 of opengrep_manylinux_x86 for the pinned version. Update both together on a bump.
          OPENGREP_SHA256: 1f06548af379ab6080698a609612890ffad2d92dc2172f1e97d38d48096d5ef8
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/opengrep_manylinux_x86" -o /usr/local/bin/opengrep
          echo "${OPENGREP_SHA256}  /usr/local/bin/opengrep" | sha256sum -c -
          chmod +x /usr/local/bin/opengrep
          opengrep --version

      - name: Fetch OpenGrep OSS rules (pinned commit; drop the spring pack)
        env:
          # Pin the rules to an exact commit so a scan is reproducible and cannot be altered upstream.
          OPENGREP_RULES_SHA: f1d2b562b414783763fd02a6ed2736eaed622efa
        run: |
          set -euo pipefail
          git clone --filter=blob:none --no-checkout https://github.com/opengrep/opengrep-rules.git /tmp/ogr
          git -C /tmp/ogr checkout "${OPENGREP_RULES_SHA}"
          rm -rf /tmp/ogr/java/spring   # false-matches non-Spring Keycloak SPIs

      - name: OpenGrep — GATE on findings (SARIF report)
        run: |
          opengrep scan --config /tmp/ogr/java --config /tmp/ogr/generic/secrets \
            --error --exclude '*.md' \
            --sarif --output opengrep.sarif .

      - name: Upload OpenGrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: opengrep.sarif
          category: opengrep

      - name: Upload OpenGrep report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: opengrep-sast
          path: opengrep.sarif
          if-no-files-found: ignore
          retention-days: 30
